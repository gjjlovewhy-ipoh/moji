name: 自动抓取墨迹天气图片+导出链接JSON

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  crawl-task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行爬虫，生成图片+JSON链接
        run: python main.py

      - name: 打包所有资源（图片+JSON）
        run: zip -r crawl_result.zip spratly_images_full/ image_links.json

      - name: 上传运行产物
        uses: actions/upload-artifact@v4
        with:
          name: 图片与链接JSON归档
          path: crawl_result.zip
