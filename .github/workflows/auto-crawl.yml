name: 自动抓取图片并导出JSON链接

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖库
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行爬虫生成图片与JSON
        run: python main.py

      - name: 打包图片文件夹与根目录JSON
        run: zip -r crawl_result.zip spratly_images_full/ image_links.json

      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: 图片与链接JSON压缩包
          path: crawl_result.zip

      # 可选：自动把最新JSON提交回仓库根目录
      - name: 自动提交更新JSON文件
        run: |
          git config user.name "Auto Bot"
          git config user.email "bot@github.com"
          git add image_links.json
          git commit -m "🤖 自动更新图片链接JSON"
          git push
