name: 自动抓取墨迹天气图片

# 触发规则
on:
  push:
    branches: [ main ]
  # 定时每日自动执行一次
  schedule:
    - cron: '0 8 * * *'
  # 支持手动点击运行
  workflow_dispatch:

jobs:
  crawl-task:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装项目依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行图片爬虫
        run: python main.py

      - name: 压缩抓取的图片文件夹
        run: zip -r spratly_images.zip spratly_images_full/

      - name: 上传图片压缩包为产物
        uses: actions/upload-artifact@v4
        with:
          name: 抓取图片归档
          path: spratly_images.zip
